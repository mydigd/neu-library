<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-page">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="neu-emblem-sm"><img src="neuliblogo.png" width="50"></div>
      <div>
        <span class="sidebar-title">Library</span>
        <span class="sidebar-role">Admin Panel</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="#" class="nav-item" data-section="visitors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Visitors
      </a>
    </nav>
    <div class="sidebar-footer">
      <span id="admin-email"></span>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
  </aside>

  <main class="admin-main">
    <section id="section-dashboard" class="admin-section active">
      <div class="section-header">
        <div>
          <h1>Dashboard</h1>
          <p class="section-sub">Library visitor statistics overview</p>
        </div>
        <div class="date-display" id="today-date"></div>
      </div>

      <div class="filter-bar">
        <div class="time-tabs">
          <button class="time-tab active" data-range="today">Today</button>
          <button class="time-tab" data-range="week">This Week</button>
          <button class="time-tab" data-range="month">This Month</button>
          <button class="time-tab" data-range="custom">Custom</button>
        </div>
        <div class="custom-range hidden" id="custom-range">
          <input type="date" id="date-from" />
          <span>to</span>
          <input type="date" id="date-to" />
          <button class="btn-apply" id="apply-range">Apply</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card accent-blue">
          <div class="stat-icon">👥</div>
          <div class="stat-info"><span class="stat-label">Total Visits</span><span class="stat-value" id="stat-total">—</span></div>
        </div>
        <div class="stat-card accent-green">
          <div class="stat-icon">🎓</div>
          <div class="stat-info"><span class="stat-label">Students</span><span class="stat-value" id="stat-students">—</span></div>
        </div>
        <div class="stat-card accent-amber">
          <div class="stat-icon">🏫</div>
          <div class="stat-info"><span class="stat-label">Employees</span><span class="stat-value" id="stat-employees">—</span></div>
        </div>
        <div class="stat-card accent-rose">
          <div class="stat-icon">📖</div>
          <div class="stat-info"><span class="stat-label">Top Purpose</span><span class="stat-value" id="stat-top-purpose" style="font-size:1rem">—</span></div>
        </div>
      </div>

      <div class="filters-row">
        <h3>Filter by</h3>
        <div class="filters-group">
          <select id="filter-purpose" class="filter-select">
            <option value="">All Purposes</option>
            <option value="Reading">Reading</option>
            <option value="Studying">Studying</option>
            <option value="Researching">Researching</option>
            <option value="Use of Computer">Use of Computer</option>
            <option value="Borrowing Books">Borrowing Books</option>
            <option value="Returning Books">Returning Books</option>
            <option value="Group Study">Group Study</option>
            <option value="Other">Other</option>
          </select>
          <select id="filter-college" class="filter-select">
            <option value="">All Colleges</option>
            <option value="COA">College of Accountancy (COA)</option>
            <option value="CAS">College of Arts and Sciences(CAS)</option>
            <option value="CBA">College of Business Administration</option>
            <option value="COC">College of Communication(COC)</option>
            <option value="CICS">College of Informatics and Computing Studies (CICS)</option>
            <option value="CCR">College of Criminology</option>
            <option value="CED">College of Education (CED)</option>
            <option value="CEA">College of Engineering and Architecture(CEA)</option>
            <option value="CMT">College of Medical Technology (CMT)</option>
            <option value="CMW">College of Midwifery(CMW)</option>
            <option value="CON">College of Nursing(CON)</option>
            <option value="CPT">College of Physical Therapy(CPT)</option>
            <option value="CRT">College of Respiratory Therapy(CRT)</option>
            <option value="SOIR">School of International Relations(SOIR)</option>
            <option value="Staff">Staff / Faculty</option>
            <option value="Other">Other</option>
          </select>
          <select id="filter-employee" class="filter-select">
            <option value="">All Types</option>
            <option value="false">Students Only</option>
            <option value="true">Employees Only</option>
          </select>
          <button class="btn-apply" id="apply-filters">Apply</button>
        </div>
      </div>

      <div class="breakdown-header"><h3>Visitors by College</h3></div>
      <div class="college-grid" id="college-grid"></div>
    </section>

    <section id="section-visitors" class="admin-section">
      <div class="section-header">
        <div>
          <h1>Visitor Logs</h1>
          <p class="section-sub">All recorded library visits</p>
        </div>
      </div>
      <div class="search-bar-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search by name, email, student number, or college..." />
      </div>
      <div class="table-wrap">
        <table class="visitors-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Student No.</th>
              <th>College</th>
              <th>Purpose</th>
              <th>Type</th>
              <th>Date & Time</th>
            </tr>
          </thead>
          <tbody id="visitors-tbody">
            <tr><td colspan="6" class="table-empty">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
