<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/intro-style.css" />
</head>
<body class="intro-page">
  <div class="bg-layer">
    <div class="bg-overlay" style="position:absolute;inset:0;background:rgba(10,22,40,0.72);z-index:1;"></div>
    <div class="grid-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="intro-wrapper">
    <header class="intro-topbar">
      <div class="neu-badge">
        <div class="neu-seal"><img src="neuliblogo.png" width="50"></div>
        <div class="neu-label">
          <span>New Era University</span>
          <span>Diliman, Quezon City</span>
        </div>
      </div>
      <div class="live-clock">
        <span id="clock-time">--:-- --</span>
        <span id="clock-date">Loading...</span>
      </div>
    </header>

    <section class="intro-hero">
      <p class="hero-eyebrow">University Library System</p>
      <h1 class="hero-title">
        Welcome to the
        <span class="gold-word">NEU Library</span>
      </h1>
      <div class="hero-divider"></div>
      <div class="enter-btn-wrap">
        <a href="visitor-signup.html" class="btn-enter">
          <span>Enter the Library</span>
          <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </section>

    <footer class="intro-bottom">
      <span class="hours-label">Library Hours</span>
      <div class="hours-list">
        <div class="hours-item">
          <span class="hours-day">Mon – Fri</span>
          <span class="hours-time">7:30 AM – 7:00 PM</span>
        </div>
        <div class="hours-item">
          <span class="hours-day">Saturday</span>
          <span class="hours-time">8:00 AM – 5:00 PM</span>
        </div>
        <div class="hours-item">
          <span class="hours-day">Sunday</span>
          <span class="hours-time">Closed</span>
        </div>
      </div>
      <div class="status-dot" id="status-badge">
        <span class="dot"></span>
        <span id="status-text">Checking...</span>
      </div>
    </footer>
  </div>

  <script>
    function updateClock() {
      const now = new Date()
      document.getElementById('clock-time').textContent = now.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true })
      document.getElementById('clock-date').textContent = now.toLocaleDateString('en-PH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
      const day = now.getDay(), t = now.getHours() + now.getMinutes() / 60
      const isOpen = (day >= 1 && day <= 5 && t >= 7.5 && t < 19) || (day === 6 && t >= 8 && t < 17)
      const badge = document.getElementById('status-badge')
      badge.className = 'status-dot ' + (isOpen ? 'open' : 'closed')
      document.getElementById('status-text').textContent = isOpen ? 'Open Now' : 'Closed'
    }
    updateClock()
    setInterval(updateClock, 1000)
  </script>
</body>
</html>
