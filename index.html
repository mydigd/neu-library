<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="css/intro-style.css" />

<body>
 
  <!-- Background -->
  <div class="bg-layer">
    <div class="bg-radial"></div>
    <div class="grid-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
 
  <div class="intro-wrapper">
 
    <!-- TOP BAR -->
    <header class="intro-topbar">
      <div class="neu-badge">
        <div class="neu-seal"><img src="neuliblogo.png" width="50"></div>
        <div class="neu-label">
          <span>New Era University</span>
          <span>Diliman, Quezon City</span>
        </div>
      </div>
      <div class="live-clock">
        <span id="clock-time">--:-- --</span>
        <span id="clock-date">Loading...</span>
      </div>
    </header>
 
    <!-- HERO -->
    <section class="intro-hero">
      <p class="hero-eyebrow">University Library System</p>
      <h1 class="hero-title">
        Welcome to the
        <span class="gold-word">NEU Library</span>
      </h1>


      <div class="enter-btn-wrap">
        <a href="visitor.html" class="btn-enter">
          <span>Enter the Library</span>
          <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </section>
 
    <!-- BOTTOM: LIBRARY HOURS -->
    <footer class="intro-bottom">
      <span class="hours-label">Library Hours</span>
      <div class="hours-list">
        <div class="hours-item">
          <span class="hours-day">Mon – Fri</span>
          <span class="hours-time">7:30 AM – 7:00 PM</span>
        </div>
        <div class="hours-item">
          <span class="hours-day">Saturday</span>
          <span class="hours-time">8:00 AM – 5:00 PM</span>
        </div>
        <div class="hours-item">
          <span class="hours-day">Sunday</span>
          <span class="hours-time">Closed</span>
        </div>
      </div>
      <div class="status-dot" id="status-badge">
        <span class="dot"></span>
        <span id="status-text">Checking...</span>
      </div>
    </footer>
 
  </div>
 
  <script type="module" src="js/intro.js"></script>
</body>
</html>
