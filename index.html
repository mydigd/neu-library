<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library — Visitor Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="visitor-page">

     <div class="grid-lines"></div>
     <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

  <div class="bg-pattern"></div>

  <header class="top-bar">
    <div class="top-bar-inner">
      <div class="brand-small">
        <div class="neu-emblem-sm"><img src="neuliblogo.png" width="50"></div>
        <span>Library Visitor Log</span>
      </div>
      <a href="admin-login.html" class="btn-admin-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Admin?
      </a>
    </div>
  </header>

  <main class="visitor-main">
    <div class="welcome-banner">
      <div class="welcome-text">
        <p class="welcome-label">Welcome to</p>
        <h1>NEU Library!</h1>
        <p class="welcome-sub">Please fill out the visitor log before proceeding inside.</p>
      </div>
      <div class="welcome-deco">
        <div class="book-icon">📚</div>
      </div>
    </div>

    <div class="visitor-form-card">
      <h2>Visitor Entry Log</h2>
      <p class="form-sub">All fields are required</p>

      <div id="form-error" class="alert alert-error hidden"></div>
      <div id="form-success" class="alert alert-success hidden"></div>

      <form id="visitor-form">
        <div class="form-grid">
          <div class="field">
            <label>Full Name</label>
            <input type="text" id="visitor-name" placeholder="Juan dela Cruz" required />
          </div>
          <div class="field">
            <label>Email Address</label>
            <input type="email" id="visitor-email" placeholder="yourname@school.edu.ph" required />
            <span class="field-hint">Must be a valid @neu.edu.ph email</span>
          </div>
          <div class="field">
            <label>College / Department</label>
            <select id="visitor-college" required>
              <option value="">— Select your college —</option>
                        <option value="COA">College of Accountancy (COA)</option>
                        <option value="CAS">College of Arts and Sciences(CAS)</option>
                        <option value="CBA">College of Business Administration</option>
                        <option value="COC">College of Communication(COC)</option>
                        <option value="CICS">College of Informatics and Computing Studies (CICS)</option>
                        <option value="CCR">College of Criminology</option>
                        <option value="CED">College of Education (CED)</option>
                        <option value="CEA">College of Engineering and Architecture(CEA)</option>
                        <option value="CMT">College of Medical Technology (CMT)</option>
                        <option value="CMW">College of Midwifery(CMW)</option>
                        <option value="CON">College of Nursing(CON)</option>
                        <option value="CPT">College of Physical Therapy(CPT)</option>
                        <option value="CRT">College of Respiratory Therapy(CRT)</option>
                        <option value="SOIR">School of International Relations(SOIR)</option>
                        <option value="Staff">Staff / Faculty</option>
                        <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label>Purpose of Visit</label>
            <select id="visitor-purpose" required>
              <option value="">Select your purpose</option>
              <option value="Reading">📚 Reading</option>
              <option value="Studying">📝 Studying</option>
              <option value="Researching">🔬 Researching</option>
              <option value="Use of Computer">💻 Use of Computer</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field field-full">
            <label>Are you a faculty member? (Professor / Staff)</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="is_employee" value="false" checked />
                <span class="radio-custom"></span>
                No — I am a student
              </label>
              <label class="radio-label">
                <input type="radio" name="is_employee" value="true" />
                <span class="radio-custom"></span>
                Yes — I am a teacher or staff
              </label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">
          <span>Log My Visit</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </div>
  </main>

  <script type="module" src="js/visitor.js"></script>
</body>
</html>
